<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Конвертер валют | V3NTA9</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            background: #030102;
            overflow-x: hidden;
        }

        /* На мобильных разрешаем прокрутку, но оставляем центрирование */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
                padding: 20px 10px;
            }
        }

        /* Фиксированный фон */
        .background-with-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            filter: url(#grain);
        }

        .bg-gradient {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #2a1c22 0%, #1c1115 50%, #0a0608 100%);
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .converter-card {
            position: relative;
            z-index: 10;
            background: rgba(20, 12, 15, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(230, 180, 80, 0.25);
            width: 100%;
            max-width: 540px;
            padding: 32px 28px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin: 20px auto;
        }

        .converter-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 55px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(230, 180, 80, 0.4);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
        }

        .logo {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(230, 180, 80, 0.15);
            box-shadow: 0 0 15px rgba(230, 180, 80, 0.25);
            transition: filter 0.3s ease, box-shadow 0.3s ease;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .converter-card:hover .logo {
            filter: drop-shadow(0 0 8px rgba(230, 180, 80, 0.7));
            box-shadow: 0 0 20px rgba(230, 180, 80, 0.4);
        }

        .title {
            font-size: 1.7rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #e6b84c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 500;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(230, 180, 80, 0.85);
            margin-bottom: 6px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            font-family: 'Inter', monospace;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(230, 180, 80, 0.4);
            border-radius: 20px;
            color: #ffffff;
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #e6b84c;
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 0 3px rgba(230, 180, 80, 0.2);
        }

        option {
            background: #1e171a;
            color: #f0e0c0;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin: 24px 0 20px;
        }

        button {
            flex: 1;
            padding: 12px 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:first-child {
            background: linear-gradient(135deg, #e6b84c, #c6942c);
            color: #1e1a14;
            box-shadow: 0 4px 12px rgba(230, 180, 80, 0.4);
        }

        button:first-child:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(230, 180, 80, 0.6);
            background: linear-gradient(135deg, #f0c86c, #d4a038);
        }

        button:last-child {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(230, 180, 80, 0.5);
            color: #e6b84c;
        }

        button:last-child:hover {
            background: rgba(230, 180, 80, 0.2);
            transform: translateY(-2px);
        }

        .result {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 16px 12px;
            text-align: center;
            font-weight: 600;
            font-size: 1.3rem;
            color: #e6b84c;
            margin: 20px 0 12px;
            border: 1px solid rgba(230, 180, 80, 0.35);
            text-shadow: 0 0 5px rgba(230, 180, 80, 0.3);
        }

        .status {
            font-size: 0.7rem;
            color: rgba(230, 180, 80, 0.7);
            text-align: center;
            margin-top: 12px;
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 768px) {
            .converter-card {
                max-width: 95%;
                padding: 24px 20px;
                margin: 20px auto;
            }
            .title {
                font-size: 1.4rem;
            }
            .logo {
                width: 48px;
                height: 48px;
            }
            .button-group {
                gap: 8px;
            }
            button {
                padding: 10px 10px;
                font-size: 0.85rem;
            }
            .result {
                font-size: 1.1rem;
                padding: 12px 10px;
            }
        }

        @media (max-width: 480px) {
            .converter-card {
                padding: 20px 16px;
            }
            .header {
                gap: 12px;
                margin-bottom: 20px;
            }
            .title {
                font-size: 1.2rem;
            }
            input, select {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            button {
                padding: 8px 8px;
                font-size: 0.8rem;
            }
            .result {
                font-size: 1rem;
            }
        }

        /* Планшеты вертикально */
        @media (min-width: 768px) and (max-width: 1024px) {
            .converter-card {
                max-width: 600px;
                padding: 28px 24px;
            }
        }

        /* Большие планшеты (iPad Pro, Surface) */
        @media (min-width: 1024px) and (max-width: 1366px) {
            .converter-card {
                max-width: 640px;
                padding: 32px 28px;
            }
        }

        /* Ландшафтная ориентация на мобильных — компактный режим */
        @media (max-width: 768px) and (orientation: landscape) {
            .converter-card {
                max-width: 90%;
                padding: 16px 20px;
                margin: 10px auto;
            }
            .title {
                font-size: 1.2rem;
            }
            .logo {
                width: 40px;
                height: 40px;
            }
            .input-group {
                margin-bottom: 12px;
            }
            .button-group {
                margin: 12px 0 8px;
            }
            .result {
                margin: 12px 0 8px;
                padding: 10px 10px;
            }
        }

        /* Дополнительная оптимизация для очень низких экранов в ландшафте */
        @media (max-width: 768px) and (orientation: landscape) and (max-height: 500px) {
            .converter-card {
                padding: 10px 16px;
            }
            .header {
                margin-bottom: 8px;
            }
            .logo {
                width: 32px;
                height: 32px;
            }
            .title {
                font-size: 1rem;
            }
            .input-group {
                margin-bottom: 6px;
            }
            .button-group {
                margin: 8px 0 6px;
            }
            .result {
                margin: 6px 0 4px;
                padding: 6px 8px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- SVG фильтр -->
    <svg width="0" height="0" aria-hidden="true" style="position: fixed">
        <filter id="grain" color-interpolation-filters="sRGB" x="0" y="0" width="1" height="1">
            <feTurbulence type="fractalNoise" baseFrequency="0.9713" numOctaves="4"/>
            <feDisplacementMap in="SourceGraphic" scale="80" xChannelSelector="R"/>
            <feBlend in2="SourceGraphic"/>
        </filter>
    </svg>

    <div class="background-with-grain" id="grainLayer">
        <div class="bg-gradient"></div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <div class="converter-card">
        <div class="header">
            <div class="logo">
                <img src="images/V3NTA9logo.png" alt="V9">
            </div>
            <div class="title">Currency Converter</div>
        </div>

        <div class="input-group">
            <label>Сумма</label>
            <input type="number" id="amount" placeholder="Введите сумму" value="1">
        </div>

        <div class="input-group">
            <label>Из валюты</label>
            <select id="fromCurrency"></select>
        </div>

        <div class="input-group">
            <label>В валюту</label>
            <select id="toCurrency"></select>
        </div>

        <div class="button-group">
            <button id="convertBtn">Конвертировать</button>
            <button id="refreshBtn">Обновить курсы</button>
        </div>

        <div class="result" id="result"></div>
        <div class="status" id="status"></div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let mouseX = 0, mouseY = 0;
            let time = 0;
            let resizeTimer = null;

            // Определяем, является ли устройство мобильным (ширина ≤ 768px)
            const isMobile = () => window.innerWidth <= 768;

            // Параметры
            let PARTICLE_COUNT = isMobile() ? 20 : 40;
            let DUST_COUNT = isMobile() ? 120 : 220;
            let GRAPH_POINTS = isMobile() ? 40 : 70;
            let USE_GRAIN_FILTER = !isMobile();

            // Применяем фильтр
            const grainLayer = document.getElementById('grainLayer');
            if (grainLayer) {
                grainLayer.style.filter = USE_GRAIN_FILTER ? "url(#grain)" : "none";
            }

            // --- ЗОЛОТЫЕ СИМВОЛЫ ---
            const currencySymbols = ['$', '€', '£', '¥', '₽', '₿', '¢', '₩'];
            let particles = [];

            class GoldParticle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.symbol = currencySymbols[Math.floor(Math.random() * currencySymbols.length)];
                    this.size = 22 + Math.random() * 18;
                    this.vx = (Math.random() - 0.5) * 0.4;
                    this.vy = (Math.random() - 0.5) * 0.4;
                    this.alpha = 0.6 + Math.random() * 0.4;
                    this.glow = 0.4 + Math.random() * 0.6;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotSpeed = (Math.random() - 0.5) * 0.01;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.rotation += this.rotSpeed;

                    // Отталкивание от мыши ТОЛЬКО на десктопе (не на мобильных)
                    if (!isMobile() && mouseX > 0 && mouseY > 0) {
                        const dx = this.x - mouseX;
                        const dy = this.y - mouseY;
                        const dist = Math.hypot(dx, dy);
                        if (dist < 120) {
                            const angle = Math.atan2(dy, dx);
                            const force = (1 - dist / 120) * 1.0;
                            this.vx += Math.cos(angle) * force * 0.2;
                            this.vy += Math.sin(angle) * force * 0.2;
                        }
                    }

                    if (this.x < 40) { this.x = 40; this.vx = -this.vx * 0.8; }
                    if (this.x > width - 40) { this.x = width - 40; this.vx = -this.vx * 0.8; }
                    if (this.y < 40) { this.y = 40; this.vy = -this.vy * 0.8; }
                    if (this.y > height - 40) { this.y = height - 40; this.vy = -this.vy * 0.8; }

                    this.vx *= 0.998;
                    this.vy *= 0.998;
                    this.glow = 0.5 + Math.sin(time * 0.002 + this.x) * 0.3;
                }

                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.font = `${this.size}px monospace`;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = `rgba(230, 180, 80, ${this.glow * 0.8})`;

                    const grad = ctx.createLinearGradient(-this.size/2, -this.size/4, this.size/2, this.size/4);
                    grad.addColorStop(0, '#f5c542');
                    grad.addColorStop(0.6, '#e6b422');
                    grad.addColorStop(1, '#d4a13c');
                    ctx.fillStyle = grad;
                    ctx.globalAlpha = this.alpha;
                    ctx.fillText(this.symbol, -this.size/2, this.size/3);
                    ctx.restore();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    particles.push(new GoldParticle(
                        Math.random() * width,
                        Math.random() * height
                    ));
                }
            }

            // --- ЗОЛОТАЯ ПЫЛЬ ---
            let dust = [];

            class DustParticle {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.size = 1 + Math.random() * 2.5;
                    this.vx = (Math.random() - 0.5) * 0.18;
                    this.vy = (Math.random() - 0.5) * 0.18;
                    this.alpha = 0.15 + Math.random() * 0.3;
                    this.pulseSpeed = 0.0015 + Math.random() * 0.003;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;

                    if (this.x < 0) this.x = width;
                    if (this.x > width) this.x = 0;
                    if (this.y < 0) this.y = height;
                    if (this.y > height) this.y = 0;

                    this.alpha = 0.2 + Math.sin(time * this.pulseSpeed + this.x) * 0.12;
                }

                draw() {
                    ctx.fillStyle = `rgba(230, 170, 70, ${this.alpha})`;
                    ctx.fillRect(this.x, this.y, this.size, this.size);
                }
            }

            function initDust() {
                dust = [];
                for (let i = 0; i < DUST_COUNT; i++) {
                    dust.push(new DustParticle(
                        Math.random() * width,
                        Math.random() * height
                    ));
                }
            }

            // --- ГРАФИК ---
            let graphPoints = [];

            function initGraph() {
                graphPoints = [];
                for (let i = 0; i <= GRAPH_POINTS; i++) {
                    const t = i / GRAPH_POINTS;
                    const x = t * width;
                    const yOffset = Math.sin(t * Math.PI * 2.5) * 12 + Math.sin(t * Math.PI * 1.8) * 6;
                    graphPoints.push({
                        x: x,
                        y: height - 40 + yOffset
                    });
                }
            }

            function drawGraph() {
                if (graphPoints.length === 0) return;
                ctx.beginPath();
                ctx.moveTo(graphPoints[0].x, graphPoints[0].y);
                for (let i = 1; i < graphPoints.length; i++) {
                    const p = graphPoints[i];
                    const yOffset = Math.sin(time * 0.0018 + i * 0.08) * 2;
                    ctx.lineTo(p.x, p.y + yOffset);
                }
                ctx.strokeStyle = 'rgba(230, 170, 70, 0.45)';
                ctx.lineWidth = 1.3;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(graphPoints[0].x, graphPoints[0].y + 2);
                for (let i = 1; i < graphPoints.length; i++) {
                    const p = graphPoints[i];
                    const yOffset = Math.sin(time * 0.0018 + i * 0.08) * 2;
                    ctx.lineTo(p.x, p.y + yOffset + 2);
                }
                ctx.strokeStyle = 'rgba(230, 170, 70, 0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // --- АНИМАЦИЯ ---
            function animate() {
                if (!width || !height) return;
                ctx.clearRect(0, 0, width, height);

                for (let d of dust) {
                    d.update();
                    d.draw();
                }
                for (let p of particles) {
                    p.update();
                    p.draw();
                }
                drawGraph();

                time++;
                requestAnimationFrame(animate);
            }

            // --- ПЕРЕСЧЁТ ПРИ ИЗМЕНЕНИИ РАЗМЕРА С ЗАЩИТОЙ ОТ ЧАСТЫХ ВЫЗОВОВ ---
            function handleResize() {
                if (resizeTimer) clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;

                    // Обновляем параметры под новую ширину (возможно, сменилась ориентация)
                    const newMobile = isMobile();
                    PARTICLE_COUNT = newMobile ? 20 : 40;
                    DUST_COUNT = newMobile ? 120 : 220;
                    GRAPH_POINTS = newMobile ? 40 : 70;
                    USE_GRAIN_FILTER = !newMobile;
                    if (grainLayer) {
                        grainLayer.style.filter = USE_GRAIN_FILTER ? "url(#grain)" : "none";
                    }

                    initParticles();
                    initDust();
                    initGraph();
                }, 150);
            }

            window.addEventListener('resize', handleResize);
            window.addEventListener('mousemove', (e) => {
                if (!isMobile()) {
                    mouseX = e.clientX;
                    mouseY = e.clientY;
                }
            });
            window.addEventListener('mouseleave', () => {
                mouseX = -1000;
                mouseY = -1000;
            });
            // На мобильных не используем touchmove для производительности
            if (!isMobile()) {
                window.addEventListener('touchmove', (e) => {
                    // ничего не делаем
                });
            }

            // Инициализация
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
            initDust();
            initGraph();
            animate();
        })();

        // === КОНВЕРТЕР ВАЛЮТ ===
        const API_URL = 'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json?_=' + Date.now();
        const fromSelect = document.getElementById('fromCurrency');
        const toSelect = document.getElementById('toCurrency');
        const amountInput = document.getElementById('amount');
        const convertBtn = document.getElementById('convertBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        let rates = {};

        function populateCurrencyLists(currencies) {
            fromSelect.innerHTML = '';
            toSelect.innerHTML = '';
            currencies.sort().forEach(currency => {
                const optionFrom = document.createElement('option');
                optionFrom.value = currency;
                optionFrom.text = currency.toUpperCase();
                fromSelect.appendChild(optionFrom);
                const optionTo = document.createElement('option');
                optionTo.value = currency;
                optionTo.text = currency.toUpperCase();
                toSelect.appendChild(optionTo);
            });
            fromSelect.value = 'usd';
            toSelect.value = 'eur';
        }

        async function loadCurrencies() {
            statusDiv.textContent = 'Загрузка курсов...';
            resultDiv.textContent = '';
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!data.usd) throw new Error('Некорректный ответ API');
                rates = data.usd;
                rates.usd = 1;
                const currencies = Object.keys(rates);
                populateCurrencyLists(currencies);
                statusDiv.textContent = `Курсы обновлены (${currencies.length} валют)`;
                convert();
            } catch (error) {
                statusDiv.textContent = 'Ошибка загрузки';
                resultDiv.textContent = 'Ошибка загрузки курсов валют. Проверьте подключение к интернету.';
            }
        }

        function convert() {
            const amount = parseFloat(amountInput.value);
            const from = fromSelect.value;
            const to = toSelect.value;
            if (isNaN(amount)) {
                resultDiv.textContent = 'Введите корректную сумму';
                return;
            }
            if (!rates[from] || !rates[to]) {
                resultDiv.textContent = 'Курсы валют ещё не загружены. Нажмите "Обновить курсы".';
                return;
            }
            const converted = amount * (rates[to] / rates[from]);
            resultDiv.textContent = `${amount} ${from.toUpperCase()} = ${converted.toFixed(4)} ${to.toUpperCase()}`;
        }

        async function refreshRates() { await loadCurrencies(); }

        loadCurrencies();
        convertBtn.addEventListener('click', convert);
        refreshBtn.addEventListener('click', refreshRates);
        amountInput.addEventListener('input', convert);
        fromSelect.addEventListener('change', convert);
        toSelect.addEventListener('change', convert);
    </script>
</body>
</html>
