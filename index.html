<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер валют | V3NTA9</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: #f4f4f4;
        }
        .converter {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        .button-group button {
            flex: 1;
        }
        .status {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="converter">
        <h2>Конвертер валют</h2>
        <input type="number" id="amount" placeholder="Сумма" value="1">
        
        <label>Из валюты:</label>
        <select id="fromCurrency"></select>
        
        <label>В валюту:</label>
        <select id="toCurrency"></select>
        
        <div class="button-group">
            <button id="convertBtn">Конвертировать</button>
            <button id="refreshBtn">Обновить курсы</button>
        </div>
        
        <div class="result" id="result"></div>
        <div class="status" id="status"></div>
    </div>

    <script>
        // API: бесплатный, без ключа, курсы относительно USD (включает RUB)
        const API_URL = 'https://cdn.jsdelivr.net/gh/fawazahmed0/currency-api@1/latest/currencies/usd.json?_=' + Date.now();

        const fromSelect = document.getElementById('fromCurrency');
        const toSelect = document.getElementById('toCurrency');
        const amountInput = document.getElementById('amount');
        const convertBtn = document.getElementById('convertBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');

        let rates = {};

        function populateCurrencyLists(currencies) {
            fromSelect.innerHTML = '';
            toSelect.innerHTML = '';
            
            currencies.sort().forEach(currency => {
                const optionFrom = document.createElement('option');
                optionFrom.value = currency;
                optionFrom.text = currency.toUpperCase();
                fromSelect.appendChild(optionFrom);
                
                const optionTo = document.createElement('option');
                optionTo.value = currency;
                optionTo.text = currency.toUpperCase();
                toSelect.appendChild(optionTo);
            });
            
            fromSelect.value = 'usd';
            toSelect.value = 'eur';
        }

        async function loadCurrencies() {
            statusDiv.textContent = 'Загрузка курсов...';
            resultDiv.textContent = '';
            
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Ошибка HTTP: ' + response.status);
                const data = await response.json();
                
                // API возвращает курсы относительно USD в виде объекта usd: { eur: ..., rub: ..., etc }
                if (!data.usd) throw new Error('Некорректный ответ API');
                
                // Преобразуем в формат rates, где ключ — валюта, значение — курс к USD
                rates = data.usd;
                rates.usd = 1; // добавляем курс USD к самому себе
                
                const currencies = Object.keys(rates);
                populateCurrencyLists(currencies);
                
                statusDiv.textContent = `Курсы обновлены (${currencies.length} валют)`;
                convert();
            } catch (error) {
                console.error('Ошибка:', error);
                statusDiv.textContent = 'Ошибка загрузки';
                resultDiv.textContent = 'Ошибка загрузки курсов валют. Проверьте подключение к интернету.';
            }
        }

        function convert() {
            const amount = parseFloat(amountInput.value);
            const from = fromSelect.value;
            const to = toSelect.value;
            
            if (isNaN(amount)) {
                resultDiv.textContent = 'Введите корректную сумму';
                return;
            }
            
            if (!rates[from] || !rates[to]) {
                resultDiv.textContent = 'Курсы валют ещё не загружены. Нажмите "Обновить курсы".';
                return;
            }
            
            // Конвертация: amount * (курс to / курс from)
            const converted = amount * (rates[to] / rates[from]);
            resultDiv.textContent = `${amount} ${from.toUpperCase()} = ${converted.toFixed(4)} ${to.toUpperCase()}`;
        }

        async function refreshRates() {
            await loadCurrencies();
        }

        // Инициализация
        loadCurrencies();
        convertBtn.addEventListener('click', convert);
        refreshBtn.addEventListener('click', refreshRates);
        amountInput.addEventListener('input', convert);
        fromSelect.addEventListener('change', convert);
        toSelect.addEventListener('change', convert);
    </script>
</body>
</html>
